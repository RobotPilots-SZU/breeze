# 启用传感器驱动
CONFIG_SENSOR=y
CONFIG_BMI08X=y
CONFIG_BMI08X_ACCEL_STREAM=y
CONFIG_BMI08X_GYRO_STREAM=y
# 启用日志
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# 启用CMSIS-DSP库
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_MATRIX=y 
# # C++ 支持（重要！）
CONFIG_CPP=y
CONFIG_STD_CPP17=y
# 启用浮点支持
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_DEBUG_OPTIMIZATIONS=y

#  Enable RTT logging backend
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=5
CONFIG_SEGGER_RTT_MAX_NUM_DOWN_BUFFERS=2
#增大线程堆载防止mpufault
CONFIG_MAIN_STACK_SIZE=4096
