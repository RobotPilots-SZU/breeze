# wdg看门狗配置
CONFIG_WATCHDOG=y
CONFIG_IWDG_STM32=y
CONFIG_WWDG_STM32=y

CONFIG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=4096
CONFIG_LOG_BACKEND_RTT=y

# 保留基本优化但便于调试
CONFIG_DEBUG_OPTIMIZATIONS=y     //如果不配置这一条可能导致代码被优化掉，断点无效

